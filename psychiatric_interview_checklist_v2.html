<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<title>면담 체크리스트</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root{
  --bg:#0f1117;--sf:#161b27;--sf2:#1e2535;--bd:#2a3348;--bdh:#3d4f6e;
  --t1:#e8eaf0;--t2:#8b95a8;--t3:#4a5568;
  --ac:#4f9cf9;--ac-bg:#1e3a5f;
  --gr:#34d399;--gr-bg:#0d3328;--gr-bd:#1a5040;
  --am:#fbbf24;--am-bg:#3d2e08;
  --re:#f87171;--re-bg:#3d1515;
  --pu:#a78bfa;--pu-bg:#2d1f5e;
  --te:#2dd4bf;--te-bg:#0d3330;
  --sans:'Noto Sans KR',sans-serif;
  --nav:64px;--top:56px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:var(--sans);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}

/* ── TOP BAR ── */
.top-bar{position:fixed;top:0;left:0;right:0;height:var(--top);background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:50}
.top-badge{font-size:10px;font-weight:700;letter-spacing:.06em;padding:3px 9px;border-radius:5px;background:var(--ac-bg);color:var(--ac);flex-shrink:0}
.top-title{font-size:14px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-prog{display:flex;align-items:center;gap:6px;flex-shrink:0}
.top-pct{font-size:12px;color:var(--ac);font-weight:700;min-width:32px;text-align:right}
.top-track{width:48px;height:3px;background:var(--bd);border-radius:2px;overflow:hidden}
.top-fill{height:100%;background:var(--ac);border-radius:2px;transition:width .3s ease}

/* ── SCROLL AREA ── */
.scroll-area{position:fixed;top:var(--top);bottom:var(--nav);left:0;right:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.scroll-area::-webkit-scrollbar{width:3px}
.scroll-area::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.content{padding:16px 16px 24px}

/* ── SESSION BANNER ── */
.session-banner{background:var(--am-bg);border:1px solid var(--am);border-radius:10px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.session-info{font-size:12px;color:var(--am);line-height:1.5}
.session-id{font-weight:700;font-size:13px}
.session-edit-btn{flex-shrink:0;padding:4px 10px;font-size:11px;font-family:var(--sans);background:transparent;border:1px solid var(--am);color:var(--am);border-radius:5px;cursor:pointer}

/* ── SECTION INTRO ── */
.sec-intro{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;margin-bottom:18px;font-size:12px;color:var(--t2);line-height:1.75}
.sec-intro strong{color:var(--t1)}

/* ── SECTION PILLS ── */
.sec-switcher{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:14px}
.sec-switcher::-webkit-scrollbar{display:none}
.sec-pill{flex-shrink:0;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--bdh);background:var(--sf2);color:var(--t2);cursor:pointer;white-space:nowrap;transition:all .15s}
.sec-pill.active{background:var(--ac-bg);border-color:var(--ac);color:var(--ac)}
.sec-pill.done::after{content:'✓';margin-left:5px;color:var(--gr);font-size:11px}

/* ── QUESTION GROUP ── */
.q-group{margin-bottom:20px}
.q-group-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
.gtag{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:3px}
.tag-fact   {background:var(--sf2);color:var(--t2);border:1px solid var(--bdh)}
.tag-cog    {background:var(--ac-bg);color:var(--ac);border:1px solid #1e3a5f}
.tag-affect {background:var(--pu-bg);color:var(--pu);border:1px solid #3d2f7a}
.tag-bx     {background:var(--te-bg);color:var(--te);border:1px solid #0d4040}
.tag-general{background:var(--sf2);color:var(--am);border:1px solid #3d3010}
.tag-risk   {background:var(--re-bg);color:var(--re);border:1px solid #5a1f1f}
.tag-context{background:var(--gr-bg);color:var(--gr);border:1px solid #0d4030}
.gtitle{font-size:12px;font-weight:500;color:var(--t2)}

/* ── QUESTION CARD ── */
.q-card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;margin-bottom:7px;overflow:hidden;transition:border-color .15s}
.q-card.checked{background:var(--gr-bg);border-color:var(--gr-bd)}
.q-card.has-note{border-color:var(--ac-bg)}
.q-card.checked.has-note{border-color:var(--gr-bd)}

.q-main{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;cursor:pointer;user-select:none;min-height:52px}
.q-cb{width:22px;height:22px;border-radius:6px;border:2px solid var(--bdh);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;background:transparent}
.q-card.checked .q-cb{background:var(--gr);border-color:var(--gr)}
.ck{display:none;color:#0d3328;font-size:13px;font-weight:700}
.q-card.checked .ck{display:block}
.q-body{flex:1;min-width:0}
.q-text{font-size:14px;color:var(--t1);line-height:1.55;transition:color .15s}
.q-card.checked .q-text{color:var(--t3);text-decoration:line-through}
.q-intent{font-size:11px;color:var(--t3);font-style:italic;margin-top:3px}

.q-actions{display:flex;gap:5px;flex-shrink:0;margin-top:2px;flex-direction:column;align-items:flex-end}
.tip-btn,.memo-btn{flex-shrink:0;padding:4px 8px;font-size:11px;font-family:var(--sans);border-radius:5px;cursor:pointer;white-space:nowrap}
.tip-btn{color:var(--t3);background:var(--sf2);border:1px solid var(--bd)}
.memo-btn{color:var(--ac);background:var(--ac-bg);border:1px solid #2a4a7f}
.memo-btn.active{color:var(--am);background:var(--am-bg);border-color:#5a4010}

/* ── TIP PANEL ── */
.q-tip{display:none;padding:10px 14px 12px 48px;background:var(--sf2);border-top:1px dashed var(--bd);font-size:12px;color:var(--t2);line-height:1.75}
.q-tip.open{display:block}
.tip-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--am);margin-bottom:4px}

/* ── MEMO PANEL ── */
.q-memo{display:none;padding:10px 14px 12px 14px;background:var(--sf2);border-top:1px solid var(--bd)}
.q-memo.open{display:block}
.memo-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ac);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.memo-saved-dot{width:6px;height:6px;border-radius:50%;background:var(--gr);display:none}
.memo-lbl.saved .memo-saved-dot{display:inline-block}
.memo-ta{width:100%;min-height:72px;background:var(--bg);border:1px solid var(--bdh);border-radius:7px;color:var(--t1);font-family:var(--sans);font-size:13px;line-height:1.6;padding:8px 10px;resize:vertical;outline:none;transition:border-color .15s}
.memo-ta:focus{border-color:var(--ac)}
.memo-ta::placeholder{color:var(--t3)}
.memo-char{font-size:10px;color:var(--t3);text-align:right;margin-top:3px}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:var(--sf);border-top:1px solid var(--bd);display:flex;align-items:stretch;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;user-select:none;border:none;background:transparent;color:var(--t3);font-family:var(--sans);font-size:10px;transition:color .15s;position:relative;padding:8px 4px}
.nav-btn.active{color:var(--ac)}
.nav-btn.active::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--ac);border-radius:0 0 2px 2px}
.nav-icon{font-size:18px;line-height:1;position:relative}
.done-dot{display:none;position:absolute;top:-2px;right:-5px;width:7px;height:7px;background:var(--gr);border-radius:50%;border:1.5px solid var(--sf)}
.nav-btn.sec-done .done-dot{display:block}
.nav-label{font-size:10px;line-height:1}

/* ── BOTTOM SHEET (공통) ── */
.sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:80;align-items:flex-end}
.sheet-overlay.open{display:flex}
.sheet{width:100%;max-height:88vh;background:var(--sf);border-radius:16px 16px 0 0;border-top:1px solid var(--bdh);display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom)}
.sheet-handle{width:36px;height:4px;background:var(--bdh);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.sheet-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;border-bottom:1px solid var(--bd);flex-shrink:0}
.sheet-title{font-size:15px;font-weight:700}
.sheet-close{background:var(--sf2);border:1px solid var(--bd);color:var(--t2);border-radius:6px;padding:5px 12px;font-size:12px;font-family:var(--sans);cursor:pointer}
.sheet-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 18px}
.sheet-foot{padding:12px 18px;border-top:1px solid var(--bd);flex-shrink:0;display:flex;gap:8px}

/* ── SUMMARY SHEET ── */
.sum-sec{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ac);margin:14px 0 5px}
.sum-sec:first-child{margin-top:0}
.sum-item{font-size:12px;padding:3px 0;line-height:1.6;border-bottom:1px solid var(--bd)}
.sum-item:last-child{border-bottom:none}
.sum-done{color:var(--gr)}
.sum-todo{color:var(--t3)}
.sum-note{font-size:11px;color:var(--t2);margin-top:2px;padding-left:16px;font-style:italic}

/* ── SESSION SETUP SHEET ── */
.field-lbl{font-size:11px;font-weight:700;color:var(--t2);margin-bottom:5px;letter-spacing:.04em;text-transform:uppercase}
.field-inp{width:100%;background:var(--bg);border:1px solid var(--bdh);border-radius:8px;color:var(--t1);font-family:var(--sans);font-size:14px;padding:10px 12px;outline:none;transition:border-color .15s;margin-bottom:14px}
.field-inp:focus{border-color:var(--ac)}
.field-inp::placeholder{color:var(--t3)}
.field-hint{font-size:11px;color:var(--t3);margin-top:-10px;margin-bottom:14px}

/* ── WEBHOOK SHEET ── */
.wh-status{padding:12px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none}
.wh-status.show{display:block}
.wh-ok{background:var(--gr-bg);border:1px solid var(--gr-bd);color:var(--gr)}
.wh-err{background:var(--re-bg);border:1px solid #5a1f1f;color:var(--re)}
.wh-sending{background:var(--ac-bg);border:1px solid #2a4a7f;color:var(--ac)}

/* ── BUTTONS ── */
.btn-primary{flex:1;padding:13px;background:var(--ac);color:#fff;font-family:var(--sans);font-size:14px;font-weight:700;border:none;border-radius:10px;cursor:pointer;transition:opacity .15s}
.btn-primary:active{opacity:.8}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{flex:1;padding:13px;background:var(--sf2);color:var(--t2);font-family:var(--sans);font-size:14px;font-weight:500;border:1px solid var(--bd);border-radius:10px;cursor:pointer}
.btn-danger{flex:1;padding:13px;background:var(--re-bg);color:var(--re);font-family:var(--sans);font-size:14px;font-weight:500;border:1px solid #5a1f1f;border-radius:10px;cursor:pointer}

.copy-btn{flex:1;padding:13px;background:var(--sf2);color:var(--t2);font-family:var(--sans);font-size:13px;font-weight:500;border:1px solid var(--bd);border-radius:10px;cursor:pointer}

/* ── WEBHOOK URL FIELD IN SETTINGS ── */
.wh-url-wrap{position:relative}
.wh-url-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:4px}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <span class="top-badge" id="cur-roman">I</span>
  <span class="top-title" id="cur-title">Identifying Data</span>
  <div class="top-prog">
    <div class="top-track"><div class="top-fill" id="prog-fill" style="width:0%"></div></div>
    <span class="top-pct" id="prog-pct">0%</span>
  </div>
</div>

<!-- SCROLL AREA -->
<div class="scroll-area" id="scroll-area">
  <div class="content" id="content"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav" id="bottom-nav"></nav>

<!-- ① 수집 현황 + 전송 SHEET -->
<div class="sheet-overlay" id="summary-overlay" onclick="closeSummary(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
      <span class="sheet-title">수집 현황</span>
      <button class="sheet-close" onclick="toggleSummary()">닫기</button>
    </div>
    <div class="sheet-body" id="summary-body"></div>
    <div class="sheet-foot">
      <button class="copy-btn" id="copy-btn" onclick="copyAll()">복사</button>
      <button class="btn-primary" id="send-btn" onclick="openWebhookSheet()">n8n 전송</button>
    </div>
  </div>
</div>

<!-- ② Webhook 전송 SHEET -->
<div class="sheet-overlay" id="webhook-overlay" onclick="closeWebhook(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
      <span class="sheet-title">n8n으로 전송</span>
      <button class="sheet-close" onclick="closeWebhookSheet()">닫기</button>
    </div>
    <div class="sheet-body">
      <div class="wh-status" id="wh-status"></div>
      <div class="field-lbl">Webhook URL</div>
      <div class="wh-url-wrap">
        <input class="field-inp" id="wh-url" type="password" placeholder="https://your-n8n.com/webhook/..." autocomplete="off" style="padding-right:40px">
        <button class="wh-url-eye" onclick="toggleWHVis()" id="wh-eye">👁</button>
      </div>
      <div class="field-hint">설정 후 자동 저장됩니다</div>
      <div class="field-lbl">Webhook Secret (선택)</div>
      <input class="field-inp" id="wh-secret" type="password" placeholder="X-Webhook-Secret 헤더값" autocomplete="off">
      <div class="field-hint">PRD의 N8N_WEBHOOK_SECRET 값과 동일하게 입력</div>

      <div style="background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;font-size:12px;color:var(--t2);line-height:1.75;margin-top:4px">
        <div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--am);margin-bottom:6px">전송 데이터 미리보기</div>
        <div id="payload-preview" style="font-family:monospace;font-size:11px;color:var(--t2);word-break:break-all;max-height:160px;overflow-y:auto"></div>
      </div>
    </div>
    <div class="sheet-foot">
      <button class="btn-secondary" onclick="closeWebhookSheet()">취소</button>
      <button class="btn-primary" id="wh-send-btn" onclick="sendWebhook()">전송하기</button>
    </div>
  </div>
</div>

<!-- ③ 세션 설정 SHEET -->
<div class="sheet-overlay" id="session-overlay" onclick="closeSession(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
      <span class="sheet-title">환자 세션 설정</span>
      <button class="sheet-close" onclick="closeSessionSheet()">닫기</button>
    </div>
    <div class="sheet-body">
      <div class="field-lbl">환자 코드 <span style="color:var(--re)">*</span> <span style="font-size:10px;color:var(--t3)">(PT-YYYY-NNN)</span></div>
      <input class="field-inp" id="s-id" type="text" placeholder="PT-2024-001" maxlength="30">
      <div class="field-hint">익명 식별자 권장. 실명 사용 금지.</div>
      <div class="field-lbl">면담 날짜</div>
      <input class="field-inp" id="s-date" type="date">
      <div class="field-lbl">면담자 (레지던트)</div>
      <input class="field-inp" id="s-dr" type="text" placeholder="예: R2 홍길동" maxlength="20">
      <div class="field-lbl">면담 유형</div>
      <select class="field-inp" id="s-type">
        <option value="initial">초진 면담</option>
        <option value="followup">추적 면담</option>
        <option value="case_conference">케이스 컨퍼런스</option>
        <option value="progress">경과 면담</option>
      </select>
    </div>
    <div class="sheet-foot">
      <button class="btn-danger" onclick="resetAll()">전체 초기화</button>
      <button class="btn-primary" onclick="saveSession()">저장</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   DATA
═══════════════════════════════════════════════════ */
const S=[
  {roman:"I",title:"Identifying Data",icon:"👤",
   intro:"환자의 기본 인구통계학적 정보입니다. 입원 기록지나 EMR에서 확인 가능하나, 직접 면담으로 교차 확인이 필요한 항목을 포함합니다.",
   groups:[
    {tag:"tag-general",label:"기본 정보",title:"인구통계학적 항목",questions:[
      {text:"성별, 나이, 출생 순서를 확인한다",intent:"기본 인구 정보",tip:"출생 순서는 형제관계 역동 파악에 중요합니다. '형제가 있으신가요? 몇째이신가요?'로 자연스럽게 연결하세요.",placeholder:"예) F/31, 2녀 중 첫째"},
      {text:"출생지 및 현재 거주지를 확인한다",intent:"생활 환경 파악",tip:"",placeholder:"예) 서울 은평구 출생 / 경기 김포 거주"},
      {text:"최종 학력 및 전공을 확인한다",intent:"교육 수준, 지적 능력 배경 파악",tip:"이후 cognition 섹션의 abstract thinking 해석에도 참고됩니다.",placeholder:"예) 대졸, 글로벌서비스학부"},
      {text:"현재 직업 또는 직업 상태를 확인한다 (주부/무직/재직)",intent:"사회적 기능 수준 기초 파악",tip:"",placeholder:"예) 주부, 이전 행사기획 직종"},
      {text:"결혼 상태를 확인한다 (미혼/기혼/별거/이혼/사별)",intent:"가족 구조, 지지체계 파악",tip:"",placeholder:"예) 기혼, 남편·자녀 2명"},

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
let checked={}, notes={}, cur=0;
let session={ id:'', date: new Date().toISOString().slice(0,10), dr:'', type:'initial' };
let webhookUrl='', webhookSecret='';

/* ═══════════════════════════════════════════════════
   STORAGE
═══════════════════════════════════════════════════ */
function save(){
  try{
    localStorage.setItem('cl_v3_checked', JSON.stringify(checked));
    localStorage.setItem('cl_v3_notes',   JSON.stringify(notes));
    localStorage.setItem('cl_v3_session', JSON.stringify(session));
    localStorage.setItem('cl_v3_wh_url',  webhookUrl);
    localStorage.setItem('cl_v3_wh_sec',  webhookSecret);
  }catch(e){}
}

function load(){
  try{
    const c=localStorage.getItem('cl_v3_checked'); if(c) checked=JSON.parse(c);
    const n=localStorage.getItem('cl_v3_notes');   if(n) notes=JSON.parse(n);
    const s=localStorage.getItem('cl_v3_session'); if(s) session=JSON.parse(s);
    webhookUrl    = localStorage.getItem('cl_v3_wh_url') || '';
    webhookSecret = localStorage.getItem('cl_v3_wh_sec') || '';
  }catch(e){}
}

/* ═══════════════════════════════════════════════════
   BUILD NAV
═══════════════════════════════════════════════════ */
function buildNav(){
  const nav=document.getElementById('bottom-nav');
  S.slice(0,4).forEach((s,i)=>{
    const b=document.createElement('button');
    b.className='nav-btn'+(i===0?' active':'');
    b.id='nb-'+i;
    b.onclick=()=>go(i);
    b.innerHTML=`<span class="nav-icon">${s.icon}<span class="done-dot"></span></span><span class="nav-label">${s.roman}</span>`;
    nav.appendChild(b);
  });
  // 세션 설정 버튼
  const sb=document.createElement('button');
  sb.className='nav-btn';
  sb.onclick=openSessionSheet;
  sb.innerHTML=`<span class="nav-icon">⚙️</span><span class="nav-label">세션</span>`;
  nav.appendChild(sb);
  // 현황/전송 버튼
  const mb=document.createElement('button');
  mb.className='nav-btn';
  mb.onclick=toggleSummary;
  mb.innerHTML=`<span class="nav-icon">📤</span><span class="nav-label">전송</span>`;
  nav.appendChild(mb);
}

/* ═══════════════════════════════════════════════════
   RENDER SECTION
═══════════════════════════════════════════════════ */
function go(idx){
  cur=idx;
  const s=S[idx];
  document.getElementById('cur-roman').textContent=s.roman;
  document.getElementById('cur-title').textContent=s.title;
  document.querySelectorAll('.nav-btn[id^="nb-"]').forEach((el,i)=>el.classList.toggle('active',i===idx));
  const c=document.getElementById('content');
  c.innerHTML='';

  // Session banner
  const bn=document.createElement('div');
  bn.className='session-banner';
  const sid=session.id||'세션 미설정';
  bn.innerHTML=`
    <div class="session-info">
      <div class="session-id">${sid}</div>
      <div>${session.date} · ${session.dr||'면담자 미입력'} · ${{initial:'초진',followup:'추적',case_conference:'케이스컨퍼런스',progress:'경과'}[session.type]||''}</div>
    </div>
    <button class="session-edit-btn" onclick="openSessionSheet()">편집</button>`;
  c.appendChild(bn);

  // Section switcher pills
  const sw=document.createElement('div');
  sw.className='sec-switcher';
  S.forEach((sec,i)=>{
    const p=document.createElement('div');
    p.className='sec-pill'+(i===idx?' active':'')+(isDone(i)?' done':'');
    p.textContent=sec.roman+' '+sec.title;
    p.onclick=()=>go(i);
    sw.appendChild(p);
  });
  c.appendChild(sw);

  // Intro
  const intro=document.createElement('div');
  intro.className='sec-intro';
  intro.innerHTML=s.intro;
  c.appendChild(intro);

  // Groups & cards
  s.groups.forEach((g,gi)=>{
    const grp=document.createElement('div');
    grp.className='q-group';
    const hdr=document.createElement('div');
    hdr.className='q-group-hdr';
    hdr.innerHTML=`<span class="gtag ${g.tag}">${g.label}</span><span class="gtitle">${g.title}</span>`;
    grp.appendChild(hdr);

    g.questions.forEach((q,qi)=>{
      const key=`${idx}-${gi}-${qi}`;
      const noteVal=notes[key]||'';
      const isChecked=!!checked[key];
      const hasNote=noteVal.trim().length>0;

      const card=document.createElement('div');
      card.className='q-card'+(isChecked?' checked':'')+(hasNote?' has-note':'');
      card.id='c-'+key;
      const ht=q.tip&&q.tip.trim().length>0;

      card.innerHTML=`
        <div class="q-main" onclick="toggle('${key}')">
          <div class="q-cb"><span class="ck">✓</span></div>
          <div class="q-body">
            <div class="q-text">${q.text}</div>
            <div class="q-intent">→ ${q.intent}</div>
          </div>
          <div class="q-actions">
            <button class="memo-btn${hasNote?' active':''}" id="mbtn-${key}" onclick="event.stopPropagation();toggleMemo('${key}')">📝${hasNote?' ✓':''}</button>
            ${ht?`<button class="tip-btn" onclick="event.stopPropagation();showTip('t-${key}')">팁</button>`:''}
          </div>
        </div>
        ${ht?`<div class="q-tip" id="t-${key}"><div class="tip-lbl">면담 팁</div>${q.tip}</div>`:''}
        <div class="q-memo${hasNote?' open':''}" id="m-${key}">
          <div class="memo-lbl${hasNote?' saved':''}">
            <span>면담 메모</span>
            <span class="memo-saved-dot"></span>
            <span id="ml-${key}" style="color:var(--t3);font-weight:400;text-transform:none;letter-spacing:0">${hasNote?'저장됨':'입력 후 자동 저장'}</span>
          </div>
          <textarea class="memo-ta" id="ta-${key}" placeholder="${q.placeholder||'면담 내용을 입력하세요'}" oninput="onNote('${key}',this.value)" rows="3">${noteVal}</textarea>
          <div class="memo-char" id="mc-${key}">${noteVal.length}자</div>
        </div>`;
      grp.appendChild(card);
    });
    c.appendChild(grp);
  });

  document.getElementById('scroll-area').scrollTop=0;
  updateProg();
}

/* ═══════════════════════════════════════════════════
   INTERACTIONS
═══════════════════════════════════════════════════ */
function toggle(key){
  checked[key]=!checked[key];
  const card=document.getElementById('c-'+key);
  if(card)card.classList.toggle('checked',checked[key]);
  save(); updateProg();
}

function toggleMemo(key){
  const panel=document.getElementById('m-'+key);
  if(!panel)return;
  const isOpen=panel.classList.toggle('open');
  if(isOpen){
    const ta=document.getElementById('ta-'+key);
    if(ta) setTimeout(()=>ta.focus(),50);
  }
}

function showTip(id){
  const el=document.getElementById(id);
  if(el)el.classList.toggle('open');
}

let noteTimers={};
function onNote(key, val){
  notes[key]=val;
  const mc=document.getElementById('mc-'+key);
  if(mc) mc.textContent=val.length+'자';
  const card=document.getElementById('c-'+key);
  if(card) card.classList.toggle('has-note', val.trim().length>0);
  const btn=document.getElementById('mbtn-'+key);
  if(btn){ btn.classList.toggle('active', val.trim().length>0); btn.textContent='📝'+(val.trim().length>0?' ✓':''); }
  // 저장 상태 표시 (debounce 800ms)
  const lbl=document.getElementById('ml-'+key);
  if(lbl) lbl.textContent='입력 중...';
  clearTimeout(noteTimers[key]);
  noteTimers[key]=setTimeout(()=>{
    save();
    const lbl2=document.getElementById('ml-'+key);
    const ml=document.getElementById('m-'+key)?.querySelector('.memo-lbl');
    if(lbl2) lbl2.textContent=val.trim().length>0?'저장됨':'입력 후 자동 저장';
    if(ml) ml.classList.toggle('saved', val.trim().length>0);
  }, 800);
}

/* ═══════════════════════════════════════════════════
   PROGRESS
═══════════════════════════════════════════════════ */
function isDone(idx){
  const s=S[idx]; let t=0,d=0;
  s.groups.forEach((g,gi)=>g.questions.forEach((_,qi)=>{t++;if(checked[`${idx}-${gi}-${qi}`])d++;}));
  return t>0&&d===t;
}

function updateProg(){
  let t=0,d=0;
  S.forEach((s,idx)=>{
    let st=0,sd=0;
    s.groups.forEach((g,gi)=>g.questions.forEach((_,qi)=>{t++;st++;if(checked[`${idx}-${gi}-${qi}`]){d++;sd++;}}));
    const btn=document.getElementById('nb-'+idx);
    if(btn)btn.classList.toggle('sec-done',st>0&&sd===st);
  });
  const pct=t>0?Math.round(d/t*100):0;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
  document.querySelectorAll('.sec-pill').forEach((p,i)=>p.classList.toggle('done',isDone(i)));
}

/* ═══════════════════════════════════════════════════
   SESSION SHEET
═══════════════════════════════════════════════════ */
function openSessionSheet(){
  document.getElementById('s-id').value=session.id||'';
  document.getElementById('s-date').value=session.date||new Date().toISOString().slice(0,10);
  document.getElementById('s-dr').value=session.dr||'';
  document.getElementById('s-type').value=session.type||'initial';
  document.getElementById('session-overlay').classList.add('open');
}
function closeSessionSheet(){ document.getElementById('session-overlay').classList.remove('open'); }
function closeSession(e){ if(e.target===document.getElementById('session-overlay'))closeSessionSheet(); }

function saveSession(){
  const id=document.getElementById('s-id').value.trim();
  if(!id){ alert('환자 코드를 입력해주세요.'); return; }
  if(!/^PT-\d{4}-\d{3}$/.test(id)){ alert('환자 코드 형식: PT-YYYY-NNN\n예: PT-2024-001'); return; }
  session={
    id, date:document.getElementById('s-date').value,
    dr:document.getElementById('s-dr').value.trim(),
    type:document.getElementById('s-type').value
  };
  save(); closeSessionSheet(); go(cur);
}

function resetAll(){
  if(!confirm('모든 체크, 메모, 세션 데이터를 초기화할까요? 이 작업은 되돌릴 수 없습니다.')) return;
  checked={}; notes={};
  session={id:'',date:new Date().toISOString().slice(0,10),dr:'',type:'initial'};
  try{ localStorage.removeItem('cl_v3_checked'); localStorage.removeItem('cl_v3_notes'); localStorage.removeItem('cl_v3_session'); }catch(e){}
  closeSessionSheet(); go(cur);
}

/* ═══════════════════════════════════════════════════
   SUMMARY SHEET
═══════════════════════════════════════════════════ */
function toggleSummary(){
  const o=document.getElementById('summary-overlay');
  o.classList.toggle('open');
  if(o.classList.contains('open')) buildSummary();
}
function closeSummary(e){ if(e.target===document.getElementById('summary-overlay'))toggleSummary(); }

function buildSummary(){
  let h='';
  S.forEach((s,idx)=>{
    let secDone=0, secTotal=0;
    s.groups.forEach((g,gi)=>g.questions.forEach((_,qi)=>{secTotal++;if(checked[`${idx}-${gi}-${qi}`])secDone++;}));
    h+=`<div class="sum-sec">${s.roman}. ${s.title} (${secDone}/${secTotal})</div>`;
    s.groups.forEach((g,gi)=>g.questions.forEach((q,qi)=>{
      const k=`${idx}-${gi}-${qi}`,dn=!!checked[k],note=notes[k]||'';
      h+=`<div class="sum-item ${dn?'sum-done':'sum-todo'}">
        ${dn?'✓':'○'} ${q.text}
        ${note?`<div class="sum-note">"${note.substring(0,80)}${note.length>80?'…':''}"</div>`:''}
      </div>`;
    }));
  });
  document.getElementById('summary-body').innerHTML=h;
}

function copyAll(){
  let txt=`정신건강의학과 면담 체크리스트\n세션: ${session.id||'미설정'} | 날짜: ${session.date} | ${session.dr||''}\n${'─'.repeat(40)}\n\n`;
  S.forEach((s,idx)=>{
    txt+=`[${s.roman}. ${s.title}]\n`;
    s.groups.forEach((g,gi)=>g.questions.forEach((q,qi)=>{
      const k=`${idx}-${gi}-${qi}`;
      txt+=`${checked[k]?'[완료]':'[  ]'} ${q.text}\n`;
      if(notes[k]) txt+=`       메모: ${notes[k]}\n`;
    }));
    txt+='\n';
  });
  navigator.clipboard.writeText(txt).then(()=>{
    const b=document.getElementById('copy-btn');
    b.textContent='복사 완료 ✓';
    setTimeout(()=>{b.textContent='복사';},2000);
  }).catch(()=>alert('복사 실패 — 브라우저 권한을 확인해주세요.'));
}

/* ═══════════════════════════════════════════════════
   WEBHOOK SHEET
═══════════════════════════════════════════════════ */
function buildPayload(){
  const checklist_data={};
  S.forEach((s,idx)=>{
    const secKey=`${s.roman}_${s.title.replace(/\s+/g,'_')}`;
    checklist_data[secKey]=[];
    s.groups.forEach((g,gi)=>g.questions.forEach((q,qi)=>{
      const k=`${idx}-${gi}-${qi}`;
      checklist_data[secKey].push({
        section: s.roman,
        group: g.label,
        question: q.text,
        intent: q.intent,
        checked: !!checked[k],
        note: notes[k]||''
      });
    }));
  });
  return {
    data_type: "form_interview",
    patient_code: session.id||'UNKNOWN',
    interview_date: session.date,
    interviewer: session.dr,
    interview_type: session.type,
    submitted_at: new Date().toISOString(),
    source: "html_checklist",
    checklist_data,
    summary: {
      total_items: Object.values(checklist_data).flat().length,
      checked_items: Object.values(checklist_data).flat().filter(i=>i.checked).length,
      items_with_notes: Object.values(checklist_data).flat().filter(i=>i.note.trim().length>0).length,
      completion_pct: Math.round(Object.values(checklist_data).flat().filter(i=>i.checked).length / Object.values(checklist_data).flat().length * 100)
    }
  };
}

function openWebhookSheet(){
  document.getElementById('wh-url').value=webhookUrl;
  document.getElementById('wh-secret').value=webhookSecret;
  const payload=buildPayload();
  document.getElementById('payload-preview').textContent=JSON.stringify(payload,null,2).substring(0,600)+'...';
  setWHStatus('','');
  document.getElementById('summary-overlay').classList.remove('open');
  document.getElementById('webhook-overlay').classList.add('open');
}
function closeWebhookSheet(){ document.getElementById('webhook-overlay').classList.remove('open'); }
function closeWebhook(e){ if(e.target===document.getElementById('webhook-overlay'))closeWebhookSheet(); }

function toggleWHVis(){
  const inp=document.getElementById('wh-url');
  const eye=document.getElementById('wh-eye');
  if(inp.type==='password'){ inp.type='text'; eye.textContent='🙈'; }
  else{ inp.type='password'; eye.textContent='👁'; }
}

function setWHStatus(type, msg){
  const el=document.getElementById('wh-status');
  el.className='wh-status';
  if(!type){ el.classList.remove('show'); return; }
  el.classList.add('show', `wh-${type}`);
  el.textContent=msg;
}

async function sendWebhook(){
  const url=document.getElementById('wh-url').value.trim();
  const secret=document.getElementById('wh-secret').value.trim();
  if(!url){ alert('Webhook URL을 입력해주세요.'); return; }
  if(!session.id){ alert('환자 코드가 설정되지 않았습니다. 세션 설정에서 환자 코드(PT-YYYY-NNN)를 입력하세요.'); return; }

  // 저장
  webhookUrl=url; webhookSecret=secret; save();

  const btn=document.getElementById('wh-send-btn');
  btn.disabled=true; btn.textContent='전송 중...';
  setWHStatus('sending', '⏳ n8n Webhook으로 전송 중...');

  const payload=buildPayload();
  const headers={'Content-Type':'application/json'};
  if(secret) headers['X-Webhook-Secret']=secret;

  try{
    const res=await fetch(url,{
      method:'POST',
      headers,
      body:JSON.stringify(payload),
      signal:AbortSignal.timeout(30000)
    });

    if(res.ok){
      setWHStatus('ok', `✅ 전송 완료! (${res.status}) — n8n에서 워크플로우가 시작되었습니다.`);
      btn.textContent='전송 완료 ✓';
      setTimeout(()=>{btn.textContent='전송하기'; btn.disabled=false;}, 3000);
    } else {
      const errText=await res.text().catch(()=>'');
      setWHStatus('err', `❌ 전송 실패 (${res.status}): ${errText.substring(0,100)}`);
      btn.disabled=false; btn.textContent='재시도';
    }
  }catch(err){
    if(err.name==='TimeoutError')
      setWHStatus('err','❌ 타임아웃 (30초) — n8n URL과 네트워크 상태를 확인해주세요.');
    else if(err.name==='TypeError')
      setWHStatus('err','❌ 네트워크 오류 — URL 형식이나 CORS 설정을 확인해주세요.');
    else
      setWHStatus('err',`❌ 오류: ${err.message}`);
    btn.disabled=false; btn.textContent='재시도';
  }
}

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
load(); buildNav(); go(0);

// 세션 미설정 시 자동으로 설정 시트 오픈
if(!session.id) setTimeout(openSessionSheet, 600);
</script>
